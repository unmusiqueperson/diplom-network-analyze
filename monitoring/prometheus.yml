global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "prometheus_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'diplom-api'
    static_configs:
      - targets: ['host.docker.internal:8000']

  - job_name: 'diplom-consumer'
    static_configs:
      - targets: ['host.docker.internal:8001']

  # Kafka JMX не настроен — job удалён намеренно.
  # Known limitation: Kafka внутренние метрики недоступны без JMX exporter.
  # При необходимости подключить: https://github.com/prometheus/jmx_exporter
