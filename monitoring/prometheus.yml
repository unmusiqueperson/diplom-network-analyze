global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/prometheus_rules.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'diplom-api'
    static_configs:
      - targets: ['host.docker.internal:8000']

  - job_name: 'consumer'
    static_configs:
      - targets: ['host.docker.internal:8001']