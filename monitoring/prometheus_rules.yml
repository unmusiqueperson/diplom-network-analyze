groups:
  - name: consumer_alert  
    rules:
    - alert: HighAnomalyRate
      expr: >
        sum(rate(anomalies_detected_total[2m]))
        / sum(rate(events_processed_total[2m])) * 100 > 15
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "Высокий процент аномалий"
        description: "Anomaly rate превысил 15% за последние 2 минуты"
    - alert: HighLatency
      expr: >
        histogram_quantile(0.95,
          rate(processing_latency_seconds_bucket[2m])) > 0.1
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "Высокая latency обработки событий"
        description: "p95 latency превысил 100ms за последние 2 минуты"
    - alert: ConsumerDown
      expr: up{job="consumer"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Consumer недоступен"
        description: "Prometheus не может получить метрики consumer больше 1 минуты"