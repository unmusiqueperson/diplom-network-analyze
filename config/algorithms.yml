# Параметры алгоритмов обнаружения аномалий

zscore:
  window_size: 100
  threshold: 3.0
  weight: 0.30

moving_average:
  window_size: 100
  multiplier: 5.0
  weight: 0.30

isolation_forest:
  contamination: 0.05
  random_state: 42
  n_estimators: 100
  train_size: 200
  weight: 0.25

autoencoder:
  input_dim: 5
  hidden_dims: [16, 8, 3]
  learning_rate: 0.001
  epochs: 50
  train_size: 300
  threshold_percentile: 95
  weight: 0.15

ensemble:
  min_votes: 2
  use_weights: true

batch_writer:
  batch_size: 100
  flush_interval: 5

drift_detector:
  window_size: 500
  threshold: 0.3
